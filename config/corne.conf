# ═══════════════════════════════════════════════════════════════
# Corne v3 MX — ZMK Configuration
# Hardware: ProMicro NRF52840 (nice_nano_v2 compatible)
# ═══════════════════════════════════════════════════════════════

# ── Display (OLED ambos lados) ───────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ── External Power — SIEMPRE ON al arrancar ──────────────────
# Sin esto las OLEDs pueden apagarse y no volver al reiniciar
CONFIG_ZMK_EXT_POWER=y

# ── Bluetooth ────────────────────────────────────────────────
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ── USB ──────────────────────────────────────────────────────
CONFIG_ZMK_USB=y

# ── Debounce ─────────────────────────────────────────────────
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# ── RGB Underglow ────────────────────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=240
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=15

# ── Sleep (15 min inactividad) ───────────────────────────────
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Batería ──────────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y